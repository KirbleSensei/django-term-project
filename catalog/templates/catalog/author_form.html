{% extends "base.html" %}
{% block title %}{% if object %}Edit{% else %}New{% endif %} author{% endblock %}
{% block content %}
  <h1 class="h3 mb-3">{% if object %}Edit author{% else %}New author{% endif %}</h1>
  <form method="post" class="card card-body shadow-sm col-lg-8">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {{ field.errors }}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Save</button>
    <a class="btn btn-link" href="{% url 'catalog:author-list' %}">Cancel</a>
  </form>
{% endblock %}
